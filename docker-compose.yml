services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4201:4201"
    environment:
      - NODE_ENV=production
      - PORT=4201
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4201/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
